title: Credential Dumping Activity
id: sigma-cred-001
status: active
description: >
  High-risk process execution patterns consistent with credential harvesting
  tools such as Mimikatz, procdump targeting LSASS, or SAM/SYSTEM hive
  extraction. Often a precursor to lateral movement.
severity: critical
confidence: high

mitre_attack:
  - technique: T1003.001
    tactic: Credential Access
    name: "OS Credential Dumping: LSASS Memory"
  - technique: T1003.002
    tactic: Credential Access
    name: "OS Credential Dumping: SAM"

detection:
  condition: all
  features:
    high_risk_process_count:
      gte: 1
    rare_process_count:
      gte: 1
  severity_filter:
    - critical
    - high

incident_type: Credential Dumping Activity
reason_template: >
  Credential dumping indicators: {high_risk_process_count} high-risk processes
  with {rare_process_count} rare processes observed.

evidence_template:
  - "{high_risk_process_count} high-risk process executions"
  - "{rare_process_count} rare processes"
  - "{suspicious_parent_child_count} suspicious parent-child chains"
